<!-- Contenu principal - structure restaurée pour préserver le style -->
<div class="ion-page nav-bar-wrapper">
  <ion-header>
    <ion-toolbar class="custom-toolbar-top">
      <ion-buttons slot="start">
        <ion-menu-button menu="main-menu"></ion-menu-button>
      </ion-buttons>
      <ion-title></ion-title>
      <ion-buttons slot="end" class="lang-toggle-wrapper">
        <button type="button" class="lang-btn" [class.active]="currentLang === 'fr'" (click)="setLang('fr')" aria-label="Français">FR</button>
        <span class="lang-sep">|</span>
        <button type="button" class="lang-btn" [class.active]="currentLang === 'en'" (click)="setLang('en')" aria-label="English">EN</button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
</div>

<div slot="start">
  <div>
    <a [routerLink]="['/home']">
      <img src="/assets/images/Scidemia_Logo/png/couleur/scidemia_logo_couleur.png" alt="logo_scidemia"
        class="image_equipe" style="width: 100%; max-width: 300px; height: auto" />
    </a>
  </div>
</div>
