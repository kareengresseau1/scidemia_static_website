<ion-header class="modal-header-bar">
  <ion-toolbar>
    <ion-title class="modal-title">{{ doc | docText:'title' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button class="modal-close-btn" (click)="close()" (keydown.enter)="close()" fill="clear" shape="round">×</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<div class="modal-body" *ngIf="doc">
  <div class="modal-image-section slideshow-container">
    <button type="button" class="slideshow-arrow slideshow-arrow-prev" [attr.aria-label]="'modal.previousImage' | translate"
      *ngIf="canGoPrev" (click)="prevSlide()">
      <span aria-hidden="true">‹</span>
    </button>
    <div class="modal-image-frame slideshow-image-clickable" role="button" tabindex="0" (click)="openLightbox()"
      (keydown.enter)="openLightbox()" (keydown.space)="openLightbox()"
      [attr.aria-label]="'modal.enlargeImage' | translate">
      <img [src]="currentImage" [alt]="doc | docText:'title'" class="modal-image">
    </div>
    <button type="button" class="slideshow-arrow slideshow-arrow-next" [attr.aria-label]="'modal.nextImage' | translate"
      *ngIf="canGoNext" (click)="nextSlide()">
      <span aria-hidden="true">›</span>
    </button>
    <div class="slideshow-dots" *ngIf="slideImages.length > 1">
      <button type="button" class="slideshow-dot" *ngFor="let img of slideImages; let i = index"
        [class.active]="i === currentSlideIndex" [attr.aria-label]="'Image ' + (i + 1)" (click)="goToSlide(i)">
      </button>
    </div>
  </div>
  <div class="modal-content">
    <div class="modal-details">
      <ng-container *ngIf="!doc.availableSoon">
        <p class="modal-price">{{ doc.price | number:'1.2-2' }} $</p>
        <ion-button class="modal-buy-btn" shape="round" href="{{ doc.link }}" target="_blank" rel="noopener">{{ 'modal.buy' | translate }}</ion-button>
      </ng-container>
      <p class="modal-available-soon" *ngIf="doc.availableSoon">{{ 'modal.availableSoon' | translate }}</p>
      <p class="modal-description">{{ doc | docText:'description' }}</p>
    </div>
  </div>
</div>
