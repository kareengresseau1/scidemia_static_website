<ion-content [fullscreen]="true">
  <main class="main">
    <section class="section_header notes-header">
      <app-sidebar-layout></app-sidebar-layout>
      <br><br><br>
      <h2 class="notes-page-title">{{ 'notes.title' | translate }}</h2>
      <br><br><br>

      <div class="sections-container notes-documents-grid">
        <div *ngFor="let doc of documents" class="document-card-wrapper">
          <button type="button" class="document-card" (click)="openModal(doc)">
            <div class="document-card-image-wrap">
              <img [src]="doc.image" [alt]="('doc.' + doc.id + '.title') | translate" class="document-card-image">
            </div>
            <div class="document-card-info">
              <h3 class="document-card-title">{{ ('doc.' + doc.id + '.title') | translate }}</h3>
              <p class="document-card-price">{{ doc.price }} $</p>
            </div>
          </button>
        </div>
      </div>
    </section>
    <app-footer></app-footer>
  </main>
</ion-content>
