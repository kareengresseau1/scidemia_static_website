<ion-content [fullscreen]="true">
  <main class="main">
    <section class="section_header">
      <br /><br /><br /><br /><br /><br />
      <app-sidebar-layout></app-sidebar-layout>

      <br /><br /><br /><br />

      <h2>Nos documents</h2>
      <br />
      <br />

      <div class="sections-container notes-documents-grid">
        <div *ngFor="let doc of documents" class="avantages_vente">
          <button type="button" class="document-card" (click)="openModal(doc)" style="margin-bottom: 2vh; cursor: pointer; background: none; border: none; padding: 0; font: inherit; text-align: center; width: 100%;">
            <img [src]="doc.image" [alt]="doc.title" class="image_equipe">
            <br><br>
            <h3 style="color:#06132c">{{ doc.title }}</h3>
            <p style="color:#06132c">{{ doc.price }} $</p>
            <br>
          </button>
        </div>
      </div>

    </section>
    <app-footer></app-footer>
  </main>
</ion-content>
